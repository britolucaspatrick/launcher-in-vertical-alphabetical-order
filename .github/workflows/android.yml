name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Create google-services.json
      run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run unit tests
      run: ./gradlew test

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Decode Keystore
      run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

    - name: Build Release APK
      run: |
        ./gradlew assembleRelease \
          -PRELEASE_STORE_FILE=keystore.jks \
          -PRELEASE_STORE_PASSWORD='${{ secrets.RELEASE_STORE_PASSWORD }}' \
          -PRELEASE_KEY_ALIAS='${{ secrets.RELEASE_KEY_ALIAS }}' \
          -PRELEASE_KEY_PASSWORD='${{ secrets.RELEASE_KEY_PASSWORD }}'

    - name: Upload Debug APK
      uses: actions/upload-artifact@v7
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v7
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk

  test-lab:
    name: Firebase Test Lab (Robo)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v6

    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Run Robo Test
      run: |
        gcloud firebase test android run \
          --type robo \
          --app app/build/outputs/apk/debug/app-debug.apk \
          --device model=pixel8pro,version=34,locale=pt_BR,orientation=portrait \
          --robo-script robo_script.json \
          --timeout 3m
